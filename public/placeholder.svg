<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" fill="none">
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: #F8FAFC; }
      .chart-line { stroke: #0B1F3A; }
      .accent { fill: #B79A67; }
      .text { fill: #64748B; }
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: #0F172A; }
      .chart-line { stroke: #E2E8F0; }
      .accent { fill: #B79A67; }
      .text { fill: #94A3B8; }
    }
  </style>

  <!-- 배경 -->
  <rect width="1200" height="1200" class="background" rx="12"/>

  <!-- 차트 컨테이너 -->
  <rect x="100" y="200" width="1000" height="600" rx="8" fill="rgba(11, 31, 58, 0.05)" stroke="rgba(183, 154, 103, 0.2)" stroke-width="2"/>

  <!-- 그리드 라인 -->
  <g opacity="0.3">
    <path d="M100 300 L1100 300" stroke="#B79A67" stroke-width="1"/>
    <path d="M100 400 L1100 400" stroke="#B79A67" stroke-width="1"/>
    <path d="M100 500 L1100 500" stroke="#B79A67" stroke-width="1"/>
    <path d="M100 600 L1100 600" stroke="#B79A67" stroke-width="1"/>
    <path d="M100 700 L1100 700" stroke="#B79A67" stroke-width="1"/>
    <path d="M300 200 L300 800" stroke="#B79A67" stroke-width="1"/>
    <path d="M500 200 L500 800" stroke="#B79A67" stroke-width="1"/>
    <path d="M700 200 L700 800" stroke="#B79A67" stroke-width="1"/>
    <path d="M900 200 L900 800" stroke="#B79A67" stroke-width="1"/>
  </g>

  <!-- 메인 차트 라인 -->
  <path d="M150 650 L250 600 L350 680 L450 550 L550 620 L650 520 L750 580 L850 480 L950 540 L1050 460"
        class="chart-line" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 캔들스틱들 -->
  <g opacity="0.7">
    <rect x="240" y="590" width="8" height="40" class="accent"/>
    <rect x="340" y="540" width="8" height="60" class="accent"/>
    <rect x="440" y="520" width="8" height="80" class="accent"/>
    <rect x="540" y="480" width="8" height="100" class="accent"/>
    <rect x="640" y="460" width="8" height="120" class="accent"/>
    <rect x="740" y="420" width="8" height="140" class="accent"/>
    <rect x="840" y="400" width="8" height="160" class="accent"/>
    <rect x="940" y="380" width="8" height="180" class="accent"/>
  </g>

  <!-- 상승 화살표들 -->
  <g opacity="0.8">
    <path d="M280 570 L290 560 L300 570 L295 570 L295 585 L285 585 L285 570 Z" class="accent"/>
    <path d="M480 500 L490 490 L500 500 L495 500 L495 515 L485 515 L485 500 Z" class="accent"/>
    <path d="M680 440 L690 430 L700 440 L695 440 L695 455 L685 455 L685 440 Z" class="accent"/>
  </g>

  <!-- 텍스트 -->
  <text x="600" y="900" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" class="text">차트 데이터</text>
  <text x="600" y="960" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" class="text">실시간 시세 정보가 여기에 표시됩니다</text>
</svg>