<svg xmlns="http://www.w3.org/2000/svg" width="200" height="60" fill="none">
  <style>
    @media (prefers-color-scheme: light) {
      .text { fill: #0B1F3A; }
      .accent { fill: #B79A67; }
    }
    @media (prefers-color-scheme: dark) {
      .text { fill: #FFFFFF; }
      .accent { fill: #B79A67; }
    }
  </style>

  <!-- MOTIVEX 텍스트 -->
  <text x="70" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" class="text">MOTIVEX</text>

  <!-- 차트 아이콘 -->
  <g transform="translate(0, 15)">
    <!-- 차트 배경 -->
    <rect x="5" y="5" width="50" height="30" rx="4" fill="rgba(11, 31, 58, 0.1)" stroke="#B79A67" stroke-width="1" opacity="0.5"/>

    <!-- 차트 라인 -->
    <path d="M10 25 L15 20 L20 28 L25 18 L30 23 L35 16 L40 21 L45 14 L50 19"
          stroke="#B79A67" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- 상승 화살표 -->
    <path d="M18 12 L21 9 L24 12 L22.5 12 L22.5 16 L19.5 16 L19.5 12 Z"
          class="accent"/>
  </g>
</svg>